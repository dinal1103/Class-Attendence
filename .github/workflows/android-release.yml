name: Generate Android APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Set Production API URL
        working-directory: ./frontend
        run: echo "VITE_API_URL=https://class-attendence-sand.vercel.app/api" > .env

      - name: Build Web App
        working-directory: ./frontend
        run: npm run build

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Sync Capacitor to Android
        working-directory: ./frontend
        run: npx cap sync android

      - name: Make Gradle Wrapper Executable
        working-directory: ./frontend/android
        run: chmod +x gradlew
        
      - name: Build Android APK (Debug)
        working-directory: ./frontend/android
        run: ./gradlew assembleDebug

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          name: Smart Attendance ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
